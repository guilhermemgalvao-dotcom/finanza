<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes — Finanza</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F7F6F3;--surface:#FFFFFF;--surface2:#F0EEE9;
  --border:#E4E1D9;--border2:#D0CCBF;
  --text:#1A1916;--text2:#6B6760;--text3:#A09C94;
  --ok:#27500A;--ok-bg:#EAF3DE;--ok-border:#B0D47A;
  --info:#0C447C;--info-bg:#E6F1FB;--info-border:#85B7EB;
  --bad:#791F1F;--bad-bg:#FCEBEB;--bad-border:#F09595;
  --warn:#633806;--warn-bg:#FAEEDA;--warn-border:#F0B84A;
  --teal:#085041;--teal-bg:#E1F5EE;--teal-border:#5DCAA5;
  --amber:#633806;--amber-bg:#FAEEDA;--amber-border:#EF9F27;
  --radius:8px;--radius-lg:12px;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:1700px;margin:0 auto;padding:16px 20px}
.nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding:12px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow)}
.nav-l{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:var(--info-bg);border:2px solid var(--info-border);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:16px}
.nav-titulo{font-size:15px;font-weight:700}
.nav-sub{font-size:11px;color:var(--text2)}
.nav-r{display:flex;align-items:center;gap:6px}
button{font-family:var(--font);font-size:11px;font-weight:600;padding:6px 12px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;transition:all .15s}
button:hover{background:var(--surface2)}
button.primary{background:var(--info);color:white;border-color:var(--info)}
button.primary:hover{background:#185FA5}
button.success{background:var(--ok-bg);color:var(--ok);border-color:var(--ok-border)}
button.danger{background:var(--bad-bg);color:var(--bad);border-color:var(--bad-border)}
button:disabled{opacity:.5;cursor:not-allowed}
/* CFG */
.cfg-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);align-items:center;box-shadow:var(--shadow)}
.cfg-item{display:flex;align-items:center;gap:6px}
.cfg-lbl{font-size:10px;color:var(--text2);font-weight:700;white-space:nowrap;text-transform:uppercase;letter-spacing:.03em}
.cfg-item input{width:80px;text-align:right;font-family:var(--mono);font-size:11px;padding:4px 8px;border:1px solid var(--border2);border-radius:var(--radius);outline:none}
.cfg-item input:focus{border-color:var(--info-border)}
/* ALERTA */
.alert{display:flex;gap:10px;padding:10px 14px;border-radius:var(--radius-lg);margin-bottom:12px;font-size:12px;border:1px solid}
.alert-ok{background:var(--ok-bg);color:var(--ok);border-color:var(--ok-border)}
.alert-warn{background:var(--warn-bg);color:var(--warn);border-color:var(--warn-border)}
.alert-bad{background:var(--bad-bg);color:var(--bad);border-color:var(--bad-border)}
.alert-titulo{font-weight:700;margin-bottom:2px}
.alert-sub{font-size:11px;opacity:.85}
/* ZONA 1 */
.z1-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:10px;margin-bottom:10px}
.saldo-big{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;box-shadow:var(--shadow)}
.saldo-big-lbl{font-size:10px;color:var(--text2);font-weight:700;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.saldo-big-val{font-size:26px;font-weight:700;font-family:var(--mono);line-height:1}
.saldo-big-ctx{font-size:11px;margin-top:5px}
.saldo-sm{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;box-shadow:var(--shadow)}
.saldo-sm-lbl{font-size:10px;color:var(--text2);font-weight:700;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.saldo-sm-val{font-size:19px;font-weight:700;font-family:var(--mono);line-height:1}
.saldo-sm-ctx{font-size:10px;margin-top:5px}
.meta-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 16px;margin-bottom:14px;box-shadow:var(--shadow)}
.meta-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
.meta-lbl{font-size:10px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.meta-pct{font-size:15px;font-weight:700;font-family:var(--mono)}
.meta-track{height:7px;background:var(--surface2);border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.meta-fill{height:100%;border-radius:4px;transition:width .5s ease}
.meta-vals{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:3px;font-family:var(--mono)}
/* ZONA 2 */
.z2-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.acao{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;box-shadow:var(--shadow)}
.acao-ttl{font-size:11px;font-weight:700;margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:5px}
.acao-item{display:flex;align-items:flex-start;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);gap:8px}
.acao-item:last-child{border-bottom:none}
.acao-txt{font-size:11px;color:var(--text);flex:1;min-width:0;font-weight:500}
.acao-sub{font-size:10px;color:var(--text3);margin-top:1px}
.acao-val{font-size:12px;font-weight:700;font-family:var(--mono);flex-shrink:0}
.acao-vazio{font-size:11px;color:var(--text3);padding:4px 0;font-style:italic}
.acao-ok{font-size:11px;color:var(--ok);padding:4px 0;font-weight:600}
/* FATURA CARD */
.fatura-card{background:var(--info-bg);border:2px solid var(--info-border);border-radius:var(--radius-lg);padding:12px 16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:14px;box-shadow:var(--shadow)}
.fatura-l{display:flex;align-items:center;gap:10px}
.fatura-icone{font-size:22px}
.fatura-titulo{font-size:12px;font-weight:700;color:var(--info)}
.fatura-sub{font-size:10px;color:#185FA5;margin-top:2px;opacity:.85}
.fatura-r{display:flex;align-items:center;gap:16px}
.fatura-bloco{text-align:center}
.fatura-bloco-lbl{font-size:9px;color:#185FA5;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.fatura-bloco-val{font-size:14px;font-weight:700;font-family:var(--mono);color:var(--info)}
.fatura-sep{width:1px;height:32px;background:var(--info-border)}
.fatura-total-lbl{font-size:9px;color:#185FA5;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px;text-align:right}
.fatura-total-val{font-size:24px;font-weight:700;font-family:var(--mono);color:var(--info)}
/* SECAO */
.sec{font-size:10px;font-weight:700;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.05em}
.sec-n{width:20px;height:20px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.sec-dica{font-size:10px;font-weight:400;color:var(--text3);text-transform:none;letter-spacing:0}
/* TABELAS */
.tscroll{overflow-x:auto;margin-bottom:14px;padding-bottom:4px}
.trow{display:flex;gap:12px;align-items:flex-start}
.tb{flex-shrink:0}
.tb-h{padding:6px 12px;border-radius:var(--radius) var(--radius) 0 0;display:flex;align-items:center;justify-content:space-between;gap:8px;border:1px solid;border-bottom:none}
.tbblue{background:var(--info-bg);color:var(--info);border-color:var(--info-border)}
.tbgreen{background:var(--ok-bg);color:var(--ok);border-color:var(--ok-border)}
.tbteal{background:var(--teal-bg);color:var(--teal);border-color:var(--teal-border)}
.tbamber{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-border)}
.tb-nome{font-size:12px;font-weight:700}
.tb-inst{font-size:9px;opacity:.75;text-align:right}
.tb-hint{font-size:10px;color:var(--text3);margin-top:4px;font-style:italic}
table{border-collapse:collapse;background:var(--surface);border:1px solid var(--border);width:100%;box-shadow:var(--shadow)}
th{background:var(--surface2);font-weight:700;font-size:10px;padding:6px 8px;border:1px solid var(--border);white-space:nowrap;color:var(--text2);text-align:center}
th.l{text-align:left}
td{padding:6px 8px;border:1px solid var(--border);font-size:11px;text-align:right;white-space:nowrap;color:var(--text)}
td.l{text-align:left}
td.c{text-align:center}
.mn{font-family:var(--mono)}
.zero{color:var(--text3)}
.tr-tot td{background:var(--surface2);font-weight:700;border-top:2px solid var(--border2)}
.tr-warn td{background:#FFFDF0}
.tr-fatura td{background:var(--info-bg);border-top:2px solid var(--info-border)!important;border-bottom:2px solid var(--info-border)!important;font-weight:700}
.slbl{font-size:10px;color:var(--text3);font-weight:700;padding:4px 8px;background:var(--surface2);text-align:left;border-bottom:1px solid var(--border)}
/* TAGS */
.tag{display:inline-block;font-size:9px;padding:2px 7px;border-radius:20px;font-weight:700;border:1px solid;white-space:nowrap}
.tok{background:var(--ok-bg);color:var(--ok);border-color:var(--ok-border)}
.tprev{background:#EEEDFE;color:#3C3489;border-color:#AFA9EC}
.tpend{background:var(--bad-bg);color:var(--bad);border-color:var(--bad-border)}
.twarn{background:var(--warn-bg);color:var(--warn);border-color:var(--warn-border)}
/* ANALISE */
.an-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.an-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;box-shadow:var(--shadow)}
.an-ttl{font-size:10px;font-weight:700;color:var(--text2);margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.04em}
.an-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);gap:8px}
.an-row:last-child{border-bottom:none}
.an-lbl{font-size:11px;color:var(--text2);flex:1}
.an-val{font-size:12px;font-weight:700;font-family:var(--mono);flex-shrink:0}
.an-tot{border-top:2px solid var(--border2);margin-top:3px;padding-top:5px}
.bar-wrap{display:flex;align-items:center;gap:6px}
.bar-track{width:50px;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;flex-shrink:0;border:1px solid var(--border)}
.bar-fill{height:100%;border-radius:3px;background:var(--info)}
/* CORES */
.cok{color:var(--ok)}.cwarn{color:var(--warn)}.cbad{color:var(--bad)}.cinfo{color:var(--info)}.cteal{color:var(--teal)}
/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;width:90%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.modal h3{font-size:15px;font-weight:700;margin-bottom:14px}
.modal-form{display:flex;flex-direction:column;gap:10px}
.modal-row{display:flex;flex-direction:column;gap:4px}
.modal-row label{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}
.modal-row input,.modal-row select{padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius);font-family:var(--font);font-size:12px;outline:none;color:var(--text);background:var(--surface)}
.modal-row input:focus,.modal-row select:focus{border-color:var(--info-border)}
.modal-grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.divisao-grid{display:grid;gap:8px;margin-top:4px}
.divisao-item{display:flex;align-items:center;gap:8px}
.divisao-cor{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.divisao-nome{font-size:12px;font-weight:600;flex:1}
.divisao-input{width:90px;text-align:right}
.val-check{font-size:11px;margin-top:6px;padding:4px 8px;border-radius:var(--radius)}
.val-ok-bg{background:var(--ok-bg);color:var(--ok)}
.val-err-bg{background:var(--bad-bg);color:var(--bad)}
/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:white;padding:10px 16px;border-radius:var(--radius-lg);font-size:12px;font-weight:500;z-index:200;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.col-gap{width:12px;flex-shrink:0}
.col-stack{display:flex;flex-direction:column;gap:10px;flex-shrink:0}
.loading-full{text-align:center;padding:60px;color:var(--text3)}
</style>
</head>
<body>
<div class="app">
  <nav class="nav">
    <div class="nav-l">
      <div class="logo-icon">💰</div>
      <div>
        <div class="nav-titulo" id="navTitulo">Carregando...</div>
        <div class="nav-sub" id="navSub"></div>
      </div>
    </div>
    <div class="nav-r">
      <button onclick="window.location.href='dashboard.html'">← Meses</button>
      <button class="primary" onclick="abrirModal('cartao')">+ Cartao</button>
      <button onclick="abrirModal('plantao')">+ Plantao</button>
      <button onclick="abrirModal('boleto')">+ Boleto</button>
      <button onclick="abrirModal('fluxo')">+ Fluxo</button>
    </div>
  </nav>

  <div id="corpoApp" class="loading-full">Carregando dados do mes...</div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg" onclick="fecharModal(event)">
  <div class="modal" id="modalBox"></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const sb = createClient('https://dnvkdgrmkmfjqihrbucx.supabase.co', 'sb_publishable_5ReBx16QNSOSlVAWpOrxBA_cRRi-o6t');

const r2 = v => Math.round(v * 100) / 100;
const fmt = v => 'R$ ' + Math.abs(r2(v)).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
const fS = v => (r2(v) < 0 ? '- ' : '') + fmt(v);

let USER = null, MES = null, INTEG = [], CARTAO = [], FLUXO = [], PLANTOES = [], BOLETOS = [];

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'index.html'; return; }
  USER = session.user;
  const params = new URLSearchParams(window.location.search);
  const mesId = params.get('id');
  if (!mesId) { window.location.href = 'dashboard.html'; return; }
  await Promise.all([carregarMes(mesId), carregarInteg(), carregarDados(mesId)]);
  render();
}

async function carregarMes(id) {
  const { data } = await sb.from('meses').select('*').eq('id', id).single();
  MES = data;
  if (!MES) { window.location.href = 'dashboard.html'; return; }
  const [ano, mes] = MES.mes_referencia.split('-');
  const nome = new Date(ano, mes-1).toLocaleString('pt-BR', {month:'long', year:'numeric'});
  document.getElementById('navTitulo').textContent = nome.charAt(0).toUpperCase() + nome.slice(1);
  document.getElementById('navSub').textContent = 'Venc. cartao: dia ' + MES.vencimento_cartao + ' | Minimo: ' + fmt(MES.saldo_minimo) + ' | Meta: ' + fmt(MES.meta_economia);
}

async function carregarInteg() {
  const { data } = await sb.from('integrantes').select('*').eq('usuario_id', USER.id).order('criado_em');
  INTEG = data || [];
}

async function carregarDados(mesId) {
  const [c, f, p, b] = await Promise.all([
    sb.from('cartao_lancamentos').select('*, cartao_divisoes(*, integrantes(*))').eq('mes_id', mesId).order('criado_em'),
    sb.from('fluxo').select('*, integrantes(nome)').eq('mes_id', mesId).order('criado_em'),
    sb.from('plantoes').select('*').eq('mes_id', mesId).order('criado_em'),
    sb.from('boletos').select('*').eq('mes_id', mesId).order('dia')
  ]);
  CARTAO = c.data || [];
  FLUXO = f.data || [];
  PLANTOES = p.data || [];
  BOLETOS = b.data || [];
}

// ─── CALCULOS ────────────────────────────────────────────────────────────────
function gVT() { return r2(CARTAO.reduce((a, r) => a + parseFloat(r.valor), 0)); }
function gVB() { return r2(CARTAO.reduce((a, r) => a + parseFloat(r.valor_usuario), 0)); }
function gVF() {
  return r2(CARTAO.reduce((a, r) => {
    const divTotal = (r.cartao_divisoes || []).reduce((x, d) => x + parseFloat(d.valor), 0);
    return a + divTotal;
  }, 0));
}

function gSA() {
  const vt = gVT(); let fa = false, s = r2(parseFloat(MES.saldo_inicial));
  FLUXO.filter(x => x.status === 'ok').forEach(x => {
    let si = parseFloat(x.saida);
    if (x.is_fatura) { if (!fa) { si = vt; fa = true; } else si = 0; }
    s = r2(s + parseFloat(x.entrada) - si);
  });
  return s;
}

function gSP() {
  const vt = gVT(); let fa = false, s = r2(parseFloat(MES.saldo_inicial));
  FLUXO.forEach(x => {
    let si = parseFloat(x.saida);
    if (x.is_fatura) { if (!fa) { si = vt; fa = true; } else si = 0; }
    s = r2(s + parseFloat(x.entrada) - si);
  });
  const pend = r2(BOLETOS.filter(b => b.status === 'pend').reduce((a, b) => a + parseFloat(b.valor), 0));
  return r2(s - pend);
}

function gReim(integId) {
  const deve = r2(CARTAO.reduce((a, r) => {
    const div = (r.cartao_divisoes || []).find(d => d.integrante_id === integId);
    return a + (div ? parseFloat(div.valor) : 0);
  }, 0));
  const pago = r2(FLUXO.filter(x => x.status === 'ok' && x.integrante_id === integId).reduce((a, x) => a + parseFloat(x.entrada), 0));
  return { deve, pago, ab: r2(Math.max(0, deve - pago)) };
}

function sCl(v) {
  const min = parseFloat(MES.saldo_minimo);
  return v < 0 ? 'bad' : v < min ? 'warn' : 'ok';
}

function tagSt(st, dia, diaAtual) {
  if (st === 'ok') return '<span class="tag tok">Pago</span>';
  if (st === 'pend') return '<span class="tag tpend">Pendente</span>';
  if (st === 'prev' && dia && diaAtual && dia < diaAtual) return '<span class="tag twarn">Atrasado</span>';
  return '<span class="tag tprev">Previsto</span>';
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const vt = gVT(), vb = gVB(), vf = gVF();
  const sA = gSA(), sP = gSP();
  const min = parseFloat(MES.saldo_minimo), meta = parseFloat(MES.meta_economia);
  const vc = parseInt(MES.vencimento_cartao);
  const vtOk = Math.abs(vt - vb - vf) < 0.01;
  const pct = Math.min(100, Math.round((sP / meta) * 100));
  const clA = sCl(sA), clP = sCl(sP);
  const dia = new Date().getDate();

  // Alerta
  let aCls, aTit, aSub;
  if (!vtOk && vt > 0) { aCls = 'alert-warn'; aTit = 'Erro de divisao no cartao'; aSub = 'A soma das partes nao bate com o total. Revise os lancamentos em amarelo.'; }
  else if (sA < 0) { aCls = 'alert-bad'; aTit = 'Saldo negativo agora'; aSub = 'Voce gastou mais do que tinha disponivel.'; }
  else if (sP < 0) { aCls = 'alert-bad'; aTit = 'Saldo pode ficar negativo'; aSub = 'Com os gastos previstos, o dinheiro pode acabar antes do fim do mes.'; }
  else if (sP < min) { aCls = 'alert-warn'; aTit = 'Saldo previsto abaixo da reserva minima de ' + fmt(min); aSub = 'Nada critico agora, mas fique de olho.'; }
  else if (sP >= meta) { aCls = 'alert-ok'; aTit = 'Voce vai bater a meta de ' + fmt(meta) + '!'; aSub = 'Saldo previsto: ' + fmt(sP) + ' — folga de ' + fmt(r2(sP - meta)) + '.'; }
  else { aCls = 'alert-ok'; aTit = 'Tudo sob controle'; aSub = 'Saldo atual: ' + fmt(sA) + ' | Previsao fim do mes: ' + fmt(sP) + ' | Faltam ' + fmt(r2(meta - sP)) + ' para a meta.'; }

  // Zona 2
  const bPend = BOLETOS.filter(b => b.status === 'pend');
  const bProx = BOLETOS.filter(b => b.status === 'prev' && b.dia && b.dia - dia >= 0 && b.dia - dia <= 5);
  const reimbs = INTEG.map(i => ({ i, ...gReim(i.id) })).filter(r => r.ab > 0);
  const plPrev = PLANTOES.filter(p => p.status === 'prev');

  // Fluxo calculado
  const vt2 = gVT(); let faF = false, fSaldo = r2(parseFloat(MES.saldo_inicial));
  const fC = FLUXO.map(x => {
    let si = parseFloat(x.saida);
    if (x.is_fatura) { if (!faF) { si = vt2; faF = true; } else si = 0; }
    fSaldo = r2(fSaldo + parseFloat(x.entrada) - si);
    return { ...x, saiReal: r2(si), saldoAcc: fSaldo };
  });

  // Validacao cartao
  const inv = CARTAO.map(r => {
    const divTotal = r2((r.cartao_divisoes || []).reduce((a, d) => a + parseFloat(d.valor), 0));
    return Math.abs(r2(parseFloat(r.valor_usuario) + divTotal) - r2(parseFloat(r.valor))) > 0.01;
  });

  // Analise
  const cats = {};
  CARTAO.forEach(r => { cats[r.categoria] = r2((cats[r.categoria] || 0) + parseFloat(r.valor)); });
  const catS = Object.entries(cats).sort((a, b) => b[1] - a[1]);
  const catT = r2(Object.values(cats).reduce((a, v) => a + v, 0));
  const entT = r2(FLUXO.filter(x => x.status === 'ok' && parseFloat(x.entrada) > 0).reduce((a, x) => a + parseFloat(x.entrada), 0));
  const saiT = r2(FLUXO.filter(x => x.status === 'ok').reduce((a, x) => { let s = parseFloat(x.saida); if (x.is_fatura) s = vt; return a + s; }, 0));

        <div class="saldo-big-ctx c${clA}">${sA < 0 ? 'Voce esta no negativo' : sA < min ? 'Abaixo da reserva minima de ' + fmt(min) : 'Acima da reserva minima de ' + fmt(min)}</div>
      </div>

        <div class="saldo-sm-ctx c${clP}">${sP < 0 ? 'Pode zerar antes do fim' : sP < min ? 'Ficara abaixo do minimo' : 'Previsao confortavel'}</div>
      </div>
      <div class="saldo-sm">
        <div class="saldo-sm-lbl">Fatura do cartao</div>
        <div class="saldo-sm-val cinfo">${fmt(vt)}</div>
        <div class="saldo-sm-ctx" style="color:var(--text3)">Sua parte: ${fmt(vb)} | Familia: ${fmt(vf)}</div>
      </div>
    </div>
    <div class="meta-wrap">
      <div class="meta-top"><span class="meta-lbl">Meta de economia — ${fmt(meta)}</span><span class="meta-pct c${pct >= 100 ? 'ok' : 'warn'}">${pct}% atingido</span></div>
      <div class="meta-track"><div class="meta-fill" style="width:${pct}%;background:${pct >= 100 ? '#639922' : '#BA7517'}"></div></div>

              ${CARTAO.map((r, i) => {

            <tbody>

        </div>
      </div>

      <div class="modal-row"><label>Sua parte desta parcela (R$)</label><input type="number" id="mB" placeholder="0.00" step="0.01" oninput="validarDiv()"></div>
      ${INTEG.length > 0 ? `<p style="font-size:11px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.03em">Divisao por integrante (desta parcela):</p>
      <div class="divisao-grid" style="grid-template-columns:${INTEG.length > 2 ? '1fr 1fr' : '1fr'}">
        ${INTEG.map(i => `<div class="divisao-item">
          <div class="divisao-cor" style="background:${i.cor}"></div>
          <span class="divisao-nome">${i.nome}</span>
          <input type="number" class="divisao-input" placeholder="0.00" step="0.01" id="div_${i.id}" oninput="calcBrunna()">
        </div>`).join('')}
      </div>` : '<div style="font-size:11px;color:var(--text3);font-style:italic">Sem integrantes. Va em Integrantes para adicionar.</div>'}
      <div id="mValCheck" class="val-check" style="display:none"></div>
      <div id="mPropInfo" style="font-size:11px;color:var(--info);background:var(--info-bg);padding:6px 10px;border-radius:var(--radius);display:none"></div>
      <div class="modal-actions"><button onclick="fecharModal()">Cancelar</button><button class="primary" onclick="salvarCartao()">Salvar e propagar</button></div>
    </div>`;
  } else if (tipo === 'plantao') {
    html = `<h3>+ Novo Plantao</h3><div class="modal-form">
      <div class="modal-grid2">
        <div class="modal-row"><label>Data</label><input type="text" id="mDt" placeholder="01/03" autofocus></div>
        <div class="modal-row"><label>Horas</label><input type="text" id="mHr" placeholder="12h"></div>
      </div>
      <div class="modal-row"><label>Hospital / Local</label><input type="text" id="mH" placeholder="Ex: UPA Central"></div>
      <div class="modal-row"><label>Valor (R$)</label><input type="number" id="mV" placeholder="0.00" step="0.01"></div>
      <div class="modal-row"><label>Status</label><select id="mSt"><option value="prev">Previsto</option><option value="ok">Ja Recebido</option></select></div>
      <div class="modal-actions"><button onclick="fecharModal()">Cancelar</button><button class="primary" onclick="salvarPlantao()">Salvar</button></div>
    </div>`;
  } else if (tipo === 'boleto') {
    html = `<h3>+ Novo Boleto</h3><div class="modal-form">
      <div class="modal-grid2">
        <div class="modal-row"><label>Vencimento</label><input type="text" id="mVc" placeholder="10/03" autofocus></div>
        <div class="modal-row"><label>Dia do mes</label><input type="number" id="mD" placeholder="10" min="1" max="31"></div>
      </div>
      <div class="modal-row"><label>Descricao</label><input type="text" id="mDs" placeholder="Ex: Condominio"></div>
      <div class="modal-row"><label>Valor (R$)</label><input type="number" id="mV" placeholder="0.00" step="0.01"></div>
      <div style="background:var(--surface2);border-radius:var(--radius);padding:10px 12px;display:flex;gap:12px;align-items:center">
        <div style="flex:1">
          <label style="font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:4px">Recorrente</label>
          <input type="checkbox" id="mRecorrente" style="width:18px;height:18px;cursor:pointer" onchange="toggleRecorrencia()">
        </div>
        <div style="flex:2" id="divMesesRecorrencia" style="display:none">
          <label style="font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:4px">Repetir por quantos meses</label>
          <input type="number" id="mMesesRec" value="12" min="1" max="60" style="width:80px">
        </div>
      </div>
      <div class="modal-row"><label>Status</label><select id="mSt"><option value="prev">Previsto</option><option value="pend">Pendente</option><option value="ok">Pago</option></select></div>
      <div id="mPropInfo" style="font-size:11px;color:var(--info);background:var(--info-bg);padding:6px 10px;border-radius:var(--radius);display:none">Este boleto sera criado automaticamente nos proximos meses.</div>
      <div class="modal-actions"><button onclick="fecharModal()">Cancelar</button><button class="primary" onclick="salvarBoleto()">Salvar</button></div>
    </div>`;
  } else if (tipo === 'fluxo') {
    html = `<h3>+ Lancamento no Fluxo</h3><div class="modal-form">
      <div class="modal-grid2">
        <div class="modal-row"><label>Data</label><input type="text" id="mDt" placeholder="01/03" autofocus></div>
        <div class="modal-row"><label>Tipo</label><select id="mTp"><option>PIX recebido</option><option>PIX enviado</option><option>Debito</option><option>Credito</option></select></div>
      </div>
      <div class="modal-row"><label>Categoria</label><select id="mCat"><option>Reembolso</option><option>Plantao</option><option>Moradia</option><option>Saude</option><option>Alimentacao</option><option>Educacao</option><option>Lazer</option><option>Outros</option></select></div>
      <div class="modal-row"><label>Descricao</label><input type="text" id="mDs" placeholder="Ex: PIX Guilherme reembolso"></div>
      ${INTEG.length > 0 ? `<div class="modal-row"><label>Integrante (se reembolso)</label><select id="mIg"><option value="">— nenhum —</option>${INTEG.map(i=>`<option value="${i.id}">${i.nome}</option>`).join('')}</select></div>` : ''}
      <div class="modal-grid2">
        <div class="modal-row"><label>Entrada (R$)</label><input type="number" id="mE" placeholder="0.00" step="0.01"></div>
        <div class="modal-row"><label>Saida (R$)</label><input type="number" id="mS2" placeholder="0.00" step="0.01"></div>
      </div>
      <div class="modal-row"><label>Status</label><select id="mSt"><option value="ok">Confirmado</option><option value="prev">Previsto</option></select></div>
      <div class="modal-actions"><button onclick="fecharModal()">Cancelar</button><button class="primary" onclick="salvarFluxo()">Salvar</button></div>
    </div>`;
  }
  mbox.innerHTML = html;
  mb.classList.add('open');
};

window.atualizarParc = () => {
  const total = parseFloat(document.getElementById('mV')?.value) || 0;
  const parc = parseInt(document.getElementById('mTotalParc')?.value) || 1;
  const valParc = parc > 0 ? r2(total / parc) : 0;
  const el = document.getElementById('mValParc');
  if (el) el.textContent = fmt(valParc);
  const info = document.getElementById('mPropInfo');
  if (info && parc > 1) {
    info.style.display = 'block';
    info.textContent = `Esta compra sera lancada automaticamente nos proximos ${parc-1} meses (${parc}x de ${fmt(valParc)}).`;
  } else if (info) info.style.display = 'none';
  calcBrunna();
};

window.toggleRecorrencia = () => {
  const rec = document.getElementById('mRecorrente')?.checked;
  const div = document.getElementById('divMesesRecorrencia');
  if (div) div.style.display = rec ? 'block' : 'none';
  const info = document.getElementById('mPropInfo');
  if (info) {
    info.style.display = rec ? 'block' : 'none';
    info.textContent = 'Este boleto sera criado automaticamente nos proximos meses.';
  }
};

window.calcBrunna = () => {
  const total = parseFloat(document.getElementById('mV')?.value) || 0;
  const parc = parseInt(document.getElementById('mTotalParc')?.value) || 1;
  const valParc = r2(total / parc);
  const outros = INTEG.reduce((a, i) => a + (parseFloat(document.getElementById('div_' + i.id)?.value) || 0), 0);
  const brunna = r2(valParc - outros);
  if (document.getElementById('mB')) document.getElementById('mB').value = brunna >= 0 ? brunna.toFixed(2) : '0.00';
  const el = document.getElementById('mValParc');
  if (el) el.textContent = fmt(valParc);
  validarDiv();
};

window.validarDiv = () => {
  const total = parseFloat(document.getElementById('mV')?.value) || 0;
  const parc = parseInt(document.getElementById('mTotalParc')?.value) || 1;
  const valParc = r2(total / parc);
  const brunna = parseFloat(document.getElementById('mB')?.value) || 0;
  const outros = INTEG.reduce((a, i) => a + (parseFloat(document.getElementById('div_' + i.id)?.value) || 0), 0);
  const soma = r2(brunna + outros);
  const el = document.getElementById('mValCheck');
  if (!el) return;
  if (valParc > 0 && Math.abs(soma - valParc) > 0.01) {
    el.style.display = 'block'; el.className = 'val-check val-err-bg';
    el.textContent = 'Soma das partes (' + fmt(soma) + ') difere do valor da parcela (' + fmt(valParc) + ')';
  } else if (valParc > 0) {
    el.style.display = 'block'; el.className = 'val-check val-ok-bg';
    el.textContent = 'Divisao correta — soma = ' + fmt(valParc);
  } else el.style.display = 'none';
};

window.fecharModal = (e) => { if (!e || e.target === document.getElementById('modalBg')) document.getElementById('modalBg').classList.remove('open'); };

window.salvarCartao = async () => {
  const ds = document.getElementById('mDs').value.trim();
  const vTotal = parseFloat(document.getElementById('mV').value) || 0;
  const totalParc = parseInt(document.getElementById('mTotalParc')?.value) || 1;
  const recorrente = document.getElementById('mRecorrente')?.checked || false;
  const valParc = r2(vTotal / totalParc);
  const vb2 = parseFloat(document.getElementById('mB').value) || 0;
  if (!ds || vTotal <= 0) { toast('Preencha descricao e valor.'); return; }
  const grupoParcela = crypto.randomUUID();

  const { data: lanc, error } = await sb.from('cartao_lancamentos').insert({
    mes_id: MES.id, usuario_id: USER.id,
    data: document.getElementById('mDt').value || '01/00',
    parcela: totalParc > 1 ? '1/' + totalParc : (recorrente ? 'Mensal' : '-'),
    descricao: ds, categoria: document.getElementById('mCat').value,
    valor: valParc, valor_usuario: vb2,
    total_parcelas: totalParc, parcela_atual: 1,
    grupo_parcela: totalParc > 1 || recorrente ? grupoParcela : null,
    recorrente
  }).select().single();
  if (error) { toast('Erro: ' + error.message); return; }

  const divs = INTEG.map(i => ({
    lancamento_id: lanc.id, integrante_id: i.id, usuario_id: USER.id,
    valor: parseFloat(document.getElementById('div_' + i.id)?.value) || 0
  })).filter(d => d.valor > 0);
  if (divs.length > 0) await sb.from('cartao_divisoes').insert(divs);

  // Propagar parcelas nos meses seguintes
  if (totalParc > 1 || recorrente) {
    const mesesPropagar = recorrente ? 11 : totalParc - 1;
    const { data: mesSrc } = await sb.from('meses').select('mes_referencia').eq('id', MES.id).single();
    for (let i = 1; i <= mesesPropagar; i++) {
      const dtBase = new Date(mesSrc.mes_referencia + '-01');
      dtBase.setMonth(dtBase.getMonth() + i);
      const refProx = dtBase.toISOString().slice(0, 7);
      const diaStr = document.getElementById('mDt').value.slice(0,2) || '01';

      // Buscar ou criar o mes
      let { data: mesProx } = await sb.from('meses').select('id').eq('usuario_id', USER.id).eq('mes_referencia', refProx).single();
      if (!mesProx) {
        const { data: novo } = await sb.from('meses').insert({ usuario_id: USER.id, mes_referencia: refProx, saldo_inicial: 0, vencimento_cartao: MES.vencimento_cartao, saldo_minimo: MES.saldo_minimo, meta_economia: MES.meta_economia, arquivado: false }).select('id').single();
        mesProx = novo;
      }

      const numParc = recorrente ? (i+1) : (i+1);
      const { data: lancProx } = await sb.from('cartao_lancamentos').insert({
        mes_id: mesProx.id, usuario_id: USER.id,
        data: diaStr + '/' + String(dtBase.getMonth()+1).padStart(2,'0') + '/' + dtBase.getFullYear(),
        parcela: totalParc > 1 ? (i+1)+'/'+totalParc : 'Mensal',
        descricao: ds, categoria: document.getElementById('mCat').value,
        valor: valParc, valor_usuario: vb2,
        total_parcelas: totalParc, parcela_atual: i+1,
        grupo_parcela: grupoParcela, recorrente
      }).select('id').single();

      if (lancProx && divs.length > 0) {
        await sb.from('cartao_divisoes').insert(
          divs.map(d => ({ ...d, lancamento_id: lancProx.id }))
        );
      }
    }
    toast(`Lancamento salvo e propagado por ${mesesPropagar} mes(es)!`);
  } else {
    toast('Lancamento salvo!');
  }

  fecharModal(); await carregarDados(MES.id); render();
};

window.salvarPlantao = async () => {
  const h = document.getElementById('mH').value.trim();
  const v = parseFloat(document.getElementById('mV').value) || 0;
  if (!h || v <= 0) { toast('Preencha hospital e valor.'); return; }
  const st = document.getElementById('mSt').value;
  const { error } = await sb.from('plantoes').insert({ mes_id: MES.id, usuario_id: USER.id, data: document.getElementById('mDt').value || '00/00', hospital: h, horas: document.getElementById('mHr').value || '-', valor: v, status: st });
  if (error) { toast('Erro: ' + error.message); return; }
  if (st === 'ok') await sb.from('fluxo').insert({ mes_id: MES.id, usuario_id: USER.id, data: document.getElementById('mDt').value || '00/00', tipo: 'PIX recebido', categoria: 'Plantao', descricao: 'Plantao ' + h, entrada: v, saida: 0, status: 'ok', is_fatura: false });
  fecharModal(); toast('Plantao salvo!'); await carregarDados(MES.id); render();
};

window.salvarBoleto = async () => {
  const ds = document.getElementById('mDs').value.trim();
  const v = parseFloat(document.getElementById('mV').value) || 0;
  if (!ds || v <= 0) { toast('Preencha descricao e valor.'); return; }
  const st = document.getElementById('mSt').value;
  const recorrente = document.getElementById('mRecorrente')?.checked || false;
  const mesesRec = parseInt(document.getElementById('mMesesRec')?.value) || 12;
  const dia = parseInt(document.getElementById('mD').value) || 0;
  const vc = document.getElementById('mVc').value || '00/00';
  const grupoRec = recorrente ? crypto.randomUUID() : null;

  const { error } = await sb.from('boletos').insert({
    mes_id: MES.id, usuario_id: USER.id,
    vencimento: vc, dia, descricao: ds, valor: v, status: st,
    recorrente, grupo_recorrencia: grupoRec
  });
  if (error) { toast('Erro: ' + error.message); return; }

  if (st === 'ok') {
    await sb.from('fluxo').insert({ mes_id: MES.id, usuario_id: USER.id, data: vc, tipo: 'Debito', categoria: 'Boleto', descricao: 'Boleto ' + ds, entrada: 0, saida: v, status: 'ok', is_fatura: false });
  }

  // Propagar recorrência nos meses seguintes
  if (recorrente && mesesRec > 0) {
    const { data: mesSrc } = await sb.from('meses').select('mes_referencia').eq('id', MES.id).single();
    for (let i = 1; i <= mesesRec; i++) {
      const dtBase = new Date(mesSrc.mes_referencia + '-01');
      dtBase.setMonth(dtBase.getMonth() + i);
      const refProx = dtBase.toISOString().slice(0, 7);
      const mesStr = String(dtBase.getMonth()+1).padStart(2,'0');
      const anoStr = dtBase.getFullYear();
      const vcProx = String(dia).padStart(2,'0') + '/' + mesStr + '/' + anoStr;

      let { data: mesProx } = await sb.from('meses').select('id').eq('usuario_id', USER.id).eq('mes_referencia', refProx).single();
      if (!mesProx) {
        const { data: novo } = await sb.from('meses').insert({ usuario_id: USER.id, mes_referencia: refProx, saldo_inicial: 0, vencimento_cartao: MES.vencimento_cartao, saldo_minimo: MES.saldo_minimo, meta_economia: MES.meta_economia, arquivado: false }).select('id').single();
        mesProx = novo;
      }

      await sb.from('boletos').insert({
        mes_id: mesProx.id, usuario_id: USER.id,
        vencimento: vcProx, dia, descricao: ds, valor: v, status: 'prev',
        recorrente: true, grupo_recorrencia: grupoRec
      });
    }
    toast(`Boleto salvo e repetido por ${mesesRec} meses!`);
  } else {
    toast('Boleto salvo!');
  }

  fecharModal(); await carregarDados(MES.id); render();
};

window.salvarFluxo = async () => {
  const ds = document.getElementById('mDs').value.trim();
  const e = parseFloat(document.getElementById('mE').value) || 0;
  const s = parseFloat(document.getElementById('mS2').value) || 0;
  if (!ds || (e === 0 && s === 0)) { toast('Preencha descricao e valor.'); return; }
  const igEl = document.getElementById('mIg');
  const ig = igEl ? igEl.value || null : null;
  const { error } = await sb.from('fluxo').insert({ mes_id: MES.id, usuario_id: USER.id, data: document.getElementById('mDt').value || '00/00', tipo: document.getElementById('mTp').value, categoria: document.getElementById('mCat').value, descricao: ds, integrante_id: ig || null, entrada: e, saida: s, status: document.getElementById('mSt').value, is_fatura: false });
  if (error) { toast('Erro: ' + error.message); return; }
  fecharModal(); toast('Lancamento salvo!'); await carregarDados(MES.id); render();
};

window.receberPlantao = async (id) => {
  const p = PLANTOES.find(x => x.id === id);
  if (!p) return;
  await sb.from('plantoes').update({ status: 'ok' }).eq('id', id);
  await sb.from('fluxo').insert({ mes_id: MES.id, usuario_id: USER.id, data: p.data, tipo: 'PIX recebido', categoria: 'Plantao', descricao: 'Plantao ' + p.hospital, entrada: p.valor, saida: 0, status: 'ok', is_fatura: false });
  toast('Plantao marcado como recebido! Valor entrou no fluxo.'); await carregarDados(MES.id); render();
};

window.pagarBoleto = async (id) => {
  const b = BOLETOS.find(x => x.id === id);
  if (!b) return;
  await sb.from('boletos').update({ status: 'ok' }).eq('id', id);
  await sb.from('fluxo').insert({ mes_id: MES.id, usuario_id: USER.id, data: b.vencimento, tipo: 'Debito', categoria: 'Boleto', descricao: 'Boleto ' + b.descricao, entrada: 0, saida: b.valor, status: 'ok', is_fatura: false });
  toast('Boleto pago! Valor saiu do fluxo automaticamente.'); await carregarDados(MES.id); render();
};

window.remover = async (tabela, id) => {
  if (!confirm('Remover este item?')) return;
  await sb.from(tabela).delete().eq('id', id);
  toast('Removido.'); await carregarDados(MES.id); render();
};

function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2800); }
window.toast = toast;

// Expor USER para uso global
window.USER = null;
init().then(() => { window.USER = USER; });
</script>
</body>
</html>
