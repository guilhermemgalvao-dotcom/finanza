<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Finanza</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F7F6F3;--surface:#FFFFFF;--surface2:#F0EEE9;
  --border:#E4E1D9;--border2:#D0CCBF;
  --text:#1A1916;--text2:#6B6760;--text3:#A09C94;
  --ok:#27500A;--ok-bg:#EAF3DE;--ok-border:#B0D47A;
  --info:#0C447C;--info-bg:#E6F1FB;--info-border:#85B7EB;
  --bad:#791F1F;--bad-bg:#FCEBEB;--bad-border:#F09595;
  --warn:#633806;--warn-bg:#FAEEDA;--warn-border:#F0B84A;
  --radius:8px;--radius-lg:12px;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:1000px;margin:0 auto;padding:24px 20px}
.nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding:14px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow)}
.nav-l{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:var(--info-bg);border:2px solid var(--info-border);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-nome{font-size:16px;font-weight:700}
.nav-r{display:flex;align-items:center;gap:8px}
.av{width:34px;height:34px;border-radius:50%;background:var(--info-bg);border:2px solid var(--info-border);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--info)}
.nav-nome{font-size:13px;font-weight:500}
button{font-family:var(--font);font-size:12px;font-weight:600;padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;transition:all .15s}
button:hover{background:var(--surface2)}
button.primary{background:var(--info);color:white;border-color:var(--info)}
button.primary:hover{background:#185FA5}
button.danger{background:var(--bad-bg);color:var(--bad);border-color:var(--bad-border)}
h1{font-size:22px;font-weight:700;margin-bottom:4px}
.subtitulo{font-size:13px;color:var(--text2);margin-bottom:24px}

/* SECAO */
.sec-titulo{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);color:var(--text3)}

/* GRID MESES */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:28px}

/* CARDS */
.mes-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.mes-card:hover{border-color:var(--info-border);box-shadow:0 4px 12px rgba(59,130,246,.1);transform:translateY(-1px)}
.mes-card.atual{border-color:var(--info-border);border-width:2px}
.mes-card.arquivado{opacity:.6;cursor:pointer}
.mes-card.arquivado:hover{opacity:.85}
.mes-topo{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.mes-nome{font-size:14px;font-weight:700}
.mes-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;border:1px solid}
.badge-atual{background:var(--ok-bg);color:var(--ok);border-color:var(--ok-border)}
.badge-futuro{background:var(--info-bg);color:var(--info);border-color:var(--info-border)}
.badge-arq{background:var(--surface2);color:var(--text3);border-color:var(--border)}
.mes-metricas{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.mes-m{background:var(--surface2);border-radius:var(--radius);padding:7px 9px}
.mes-m-lbl{font-size:9px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.03em;margin-bottom:2px}
.mes-m-val{font-size:13px;font-weight:700;font-family:var(--mono)}
.mes-footer{font-size:10px;color:var(--text3)}
.cinfo{color:var(--info)}.cok{color:var(--ok)}.cwarn{color:var(--warn)}.cbad{color:var(--bad)}

/* LOADING */
.loading{text-align:center;padding:40px;color:var(--text3);font-size:14px}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:white;padding:10px 16px;border-radius:var(--radius-lg);font-size:12px;font-weight:500;z-index:200;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

/* CONFIG BAR */
.cfg-card{background:var(--info-bg);border:1px solid var(--info-border);border-radius:var(--radius-lg);padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.cfg-txt{font-size:12px;color:var(--info)}
.cfg-titulo{font-size:13px;font-weight:700;color:var(--info);margin-bottom:3px}
</style>
</head>
<body>
<div class="app">
  <nav class="nav">
    <div class="nav-l">
      <div class="logo-icon">💰</div>
      <div class="logo-nome">Finanza</div>
    </div>
    <div class="nav-r">
      <div class="av" id="navAv">?</div>
      <span class="nav-nome" id="navNome">...</span>
      <button onclick="window.location.href='config.html'">Integrantes</button>
      <button class="danger" onclick="sair()">Sair</button>
    </div>
  </nav>

  <h1 id="tituloBoas">Ola!</h1>
  <p class="subtitulo" id="subTitulo">Seus meses. Clique em um para abrir.</p>

  <div id="corpoApp" class="loading">Carregando seus meses...</div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const sb = createClient('https://dnvkdgrmkmfjqihrbucx.supabase.co','sb_publishable_5ReBx16QNSOSlVAWpOrxBA_cRRi-o6t');

const fmt = v => 'R$ '+Math.abs(Math.round(v*100)/100).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const MESES_NOME = ['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

let USER = null;

async function init() {
  const { data:{session} } = await sb.auth.getSession();
  if (!session) { window.location.href='index.html'; return; }
  USER = session.user;

  const { data:perfil } = await sb.from('perfis').select('nome').eq('id',USER.id).single();
  const nome = perfil?.nome || USER.email.split('@')[0];
  document.getElementById('navAv').textContent = nome.charAt(0).toUpperCase();
  document.getElementById('navNome').textContent = nome;
  document.getElementById('tituloBoas').textContent = 'Ola, '+nome+'!';

  // Garantir 12 meses existem
  await garantirMeses();
  // Arquivar meses passados
  await arquivarMesesPassados();
  // Renderizar
  await carregarERenderizar();
}

async function garantirMeses() {
  const hoje = new Date();
  const promises = [];
  for (let i = 0; i < 12; i++) {
    const d = new Date(hoje.getFullYear(), hoje.getMonth() + i, 1);
    const ref = d.toISOString().slice(0,7);
    promises.push(
      sb.from('meses').upsert(
        { usuario_id:USER.id, mes_referencia:ref, saldo_inicial:0, vencimento_cartao:10, saldo_minimo:500, meta_economia:1000, arquivado:false },
        { onConflict:'usuario_id,mes_referencia', ignoreDuplicates:true }
      )
    );
  }
  await Promise.all(promises);
}

async function arquivarMesesPassados() {
  const mesAtual = new Date().toISOString().slice(0,7);
  await sb.from('meses')
    .update({ arquivado:true })
    .eq('usuario_id',USER.id)
    .lt('mes_referencia',mesAtual)
    .eq('arquivado',false);
}

async function carregarERenderizar() {
  const { data:meses } = await sb.from('meses')
    .select('*')
    .eq('usuario_id',USER.id)
    .order('mes_referencia');

  if (!meses || meses.length === 0) {
    document.getElementById('corpoApp').innerHTML = '<div class="loading">Nenhum mes encontrado.</div>';
    return;
  }

  const mesAtual = new Date().toISOString().slice(0,7);
  const ativos = meses.filter(m => !m.arquivado);
  const arquivados = meses.filter(m => m.arquivado);

  let html = '';

  // MESES ATIVOS
  html += `<div class="sec-titulo">Meses ativos <span class="sec-badge">${ativos.length}</span></div>`;
  html += '<div class="grid">';
  ativos.forEach(m => {
    const [ano,mes] = m.mes_referencia.split('-');
    const nomeMes = MESES_NOME[parseInt(mes)-1]+' '+ano;
    const isAtual = m.mes_referencia === mesAtual;
    html += `
      <div class="mes-card ${isAtual?'atual':''}" onclick="abrirMes('${m.id}')">
        <div class="mes-topo">
          <div class="mes-nome">${nomeMes}</div>
          <span class="mes-badge ${isAtual?'badge-atual':'badge-futuro'}">${isAtual?'Mes atual':'Futuro'}</span>
        </div>
        <div class="mes-metricas">
          <div class="mes-m">
            <div class="mes-m-lbl">Saldo inicial</div>
            <div class="mes-m-val cinfo">${fmt(m.saldo_inicial||0)}</div>
          </div>
          <div class="mes-m">
            <div class="mes-m-lbl">Meta</div>
            <div class="mes-m-val">${fmt(m.meta_economia||0)}</div>
          </div>
        </div>
        <div class="mes-footer">Venc. cartao: dia ${m.vencimento_cartao} | Min: ${fmt(m.saldo_minimo||0)}</div>
      </div>`;
  });
  html += '</div>';

  // MESES ARQUIVADOS
  if (arquivados.length > 0) {
    html += `<div class="sec-titulo" style="margin-top:8px">Meses arquivados <span class="sec-badge">${arquivados.length}</span></div>`;
    html += '<div class="grid">';
    arquivados.slice().reverse().forEach(m => {
      const [ano,mes] = m.mes_referencia.split('-');
      const nomeMes = MESES_NOME[parseInt(mes)-1]+' '+ano;
      html += `
        <div class="mes-card arquivado" onclick="abrirMes('${m.id}')">
          <div class="mes-topo">
            <div class="mes-nome">${nomeMes}</div>
            <span class="mes-badge badge-arq">Arquivado</span>
          </div>
          <div class="mes-metricas">
            <div class="mes-m">
              <div class="mes-m-lbl">Saldo inicial</div>
              <div class="mes-m-val">${fmt(m.saldo_inicial||0)}</div>
            </div>
            <div class="mes-m">
              <div class="mes-m-lbl">Meta</div>
              <div class="mes-m-val">${fmt(m.meta_economia||0)}</div>
            </div>
          </div>
          <div class="mes-footer">Clique para visualizar</div>
        </div>`;
    });
    html += '</div>';
  }

  document.getElementById('corpoApp').innerHTML = html;
}

window.abrirMes = id => { window.location.href=`mes.html?id=${id}`; };

window.sair = async () => {
  await sb.auth.signOut();
  window.location.href='index.html';
};

function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

init();
</script>
</body>
</html>
